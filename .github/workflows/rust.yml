# ai
# 🚀 Kravex CI — "Trust, but verify. And then verify the verification." — Ancient DevOps Proverb
#
# 🧠 Knowledge graph: build → clippy → test → fmt check
# We run clippy with -D warnings so lint regressions are build failures, not suggestions.
# 🦆 The duck approves of this pipeline. The duck is always watching.

name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: 🔧 Install stable Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: 📦 Cache cargo registry and build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: 🏗️ Build
      run: cargo build --verbose

    - name: 🔍 Clippy (lint police, no warnings allowed)
      run: cargo clippy -- -D warnings

    - name: 🧪 Run tests
      run: cargo test --verbose

    - name: 🎨 Check formatting
      run: cargo fmt --all -- --check
