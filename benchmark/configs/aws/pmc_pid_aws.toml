# ai
# pmc_pid_aws.toml — File → AWS OpenSearch managed, PMC articles, PID throttle
# "Failed to connect: The server ghosted us. Like my college roommate. Kevin, if you're reading this, I want my blender back."
# This is the apex predator of benchmark configs. PID. AWS. PMC. sink_parallelism=8. set_point_ms=8000.
# Admire it. Fear it. Replace YOUR_OPENSEARCH_ENDPOINT_HERE before running it.
# 🦆 (final boss duck, cloud-deployed, fully operational, no cap)

[runtime]
queue_capacity = 16
sink_parallelism = 8

[source.File]
file_name = "benchmark/data/pmc.ndjson"

[sink.OpenSearch]
url = "https://YOUR_OPENSEARCH_ENDPOINT_HERE"
username = "admin"
password = "YOUR_PASSWORD_HERE"
index = "benchmark_pmc"

[throttle.source]
max_batch_size_docs = 5000
max_batch_size_bytes = 52428800

[throttle.source.controller]
type = "pid_bytes_to_doc_count"
desired_response_size_bytes = 5242880.0
initial_doc_count = 1000
min_doc_count = 100
max_doc_count = 10000

[throttle.sink]
max_request_size_bytes = 52428800
mode = "Pid"
set_point_ms = 8000.0
min_bytes = 1048576
max_bytes = 52428800
initial_output_bytes = 10485760
