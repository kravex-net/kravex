# ai
# pmc_pid.toml — File → Elasticsearch, PMC full-text articles dataset, PID throttle
# "Knock knock." "Who's there?" "Race condition." "Race condition wh—" "Who's there?"
# PID-controlled ingestion of medical literature. The irony of using a control system
# developed in the 1920s to ingest papers from the 2020s is not lost on us.
# 🦆 (peer-reviewed duck, citation needed)

[runtime]
queue_capacity = 16
sink_parallelism = 4

[source.File]
file_name = "benchmark/data/pmc.json"

[sink.Elasticsearch]
url = "http://localhost:9200"
index = "benchmark_pmc"

[throttle.source]
max_batch_size_docs = 5000
max_batch_size_bytes = 52428800

[throttle.source.controller]
type = "pid_bytes_to_doc_count"
desired_response_size_bytes = 5242880.0
initial_doc_count = 1000
min_doc_count = 100
max_doc_count = 10000

[throttle.sink]
max_request_size_bytes = 52428800

[throttle.sink.mode]
mode = "Pid"
set_point_ms = 5000.0
min_bytes = 1048576
max_bytes = 52428800
initial_output_bytes = 10485760
