# ai
# geonames_pid.toml — File → Elasticsearch, geonames dataset, PID throttle
# "I asked the PID controller for directions. It said: adjust, integrate, derive. Classic."
# The borrow checker rejected my feelings. The PID controller accepted them and tuned them to 5s latency.
# 🦆 (the duck is a proportional–integral–derivative waterfowl)

[runtime]
queue_capacity = 16
sink_parallelism = 4

[source.File]
file_name = "benchmark/data/geonames.json"

[sink.Elasticsearch]
url = "http://localhost:9200"
index = "benchmark_geonames"

[throttle.source]
max_batch_size_docs = 5000
max_batch_size_bytes = 52428800

[throttle.source.controller]
type = "pid_bytes_to_doc_count"
desired_response_size_bytes = 5242880.0
initial_doc_count = 1000
min_doc_count = 100
max_doc_count = 10000

[throttle.sink]
max_request_size_bytes = 52428800

[throttle.sink.mode]
mode = "Pid"
set_point_ms = 5000.0
min_bytes = 1048576
max_bytes = 52428800
initial_output_bytes = 10485760
