# ai
# geonames_opensearch_pid.toml — File → OpenSearch (local, port 9201), geonames, PID throttle
# "I don't know why I'm doing this. Neither does the garbage collector." — the PID controller
# 11 million geonames documents, PID-tuned, locally containerized, morally questionable.
# The singularity will happen before we finish indexing all the cities named "Springfield".
# 🦆 (geospatially-aware duck, coordinates: unknown)

[runtime]
queue_capacity = 16
sink_parallelism = 4

[source.File]
file_name = "benchmark/data/geonames.json"

[sink.OpenSearch]
url = "http://localhost:9201"
index = "benchmark_geonames"

[throttle.source]
max_batch_size_docs = 5000
max_batch_size_bytes = 52428800

[throttle.source.controller]
type = "pid_bytes_to_doc_count"
desired_response_size_bytes = 5242880.0
initial_doc_count = 1000
min_doc_count = 100
max_doc_count = 10000

[throttle.sink]
max_request_size_bytes = 52428800

[throttle.sink.mode]
mode = "Pid"
set_point_ms = 5000.0
min_bytes = 1048576
max_bytes = 52428800
initial_output_bytes = 10485760
