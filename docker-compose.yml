# -- ⚠️  DO NOT use these configs in production unless you enjoy incident post-mortems.
#

services:
  # -- 🔍 Elasticsearch 8.15.0 — The OG, the classic, the one your enterprise contract is paying for.
  es8:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: es8
    environment:
      - node.name=es8
      - cluster.name=kvx-bench-es-cluster
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms6g -Xmx6g
    ulimits:
      # -- 🔒 memlock: -1 means "unlimited", which sounds terrifying but is correct here
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - es8:/usr/share/elasticsearch/data
    healthcheck:
      # -- ✅ If this curl fails, the cluster is having an existential crisis
      test:
        [
          "CMD-SHELL",
          'curl -sf http://localhost:9200/_cluster/health | grep -qv ''"status":"red"''',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # -- 🔍 OpenSearch 2.19.0 — ES's open-source cousin who started a band.
  opensearch:
    image: opensearchproject/opensearch:2.19.0
    container_name: os219
    environment:
      - node.name=os219
      - cluster.name=kvx-os-cluster
      - discovery.type=single-node
      - plugins.security.disabled=true
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=${OS_JAVA_OPTS:--Xms2g -Xmx2g}
      # -- 🐛 without this, opensearch demands you set a password and ruin the vibe
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      # -- 📡 9201 on host → 9200 in container so both can coexist without a custody battle
      - "9201:9200"
    volumes:
      - os219:/usr/share/opensearch/data
    healthcheck:
      # -- ✅ "I am alive." — OpenSearch, hopefully, after 30 seconds
      test:
        [
          "CMD-SHELL",
          'curl -sf http://localhost:9200/_cluster/health | grep -qv ''"status":"red"''',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

# -- 📦 named volumes so your data survives a compose down (unlike my work-life balance)
volumes:
  es8:
    driver: local
  os219:
    driver: local
