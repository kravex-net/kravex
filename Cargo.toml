[workspace]
resolver = "3"
members = ["crates/kvx-cli", "crates/kvx"]

[workspace.dependencies]

# ğŸ˜¬ because panic is not a personality trait. well, actually...
anyhow = "1"

# âœ‰ï¸ like passing notes in class but the teacher is the runtime
async-channel = "2"

# ğŸ“‹ a figment of our configuration
figment = { version = "0.10", features = ["env", "toml"]}

# ğŸ“¡ re-quest? more like re-pray the API is up
reqwest = "0.13"

# ğŸ“¦ derive deez nuts (sorry, the conventions made me do it)
